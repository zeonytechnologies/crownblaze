<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - CrownBeatz</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .success-container {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .success-icon {
      font-size: 5rem;
      color: #00ff66;
      margin-bottom: 24px;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-glow-container">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
  </div>

  <div class="container success-container">
    <div class="glass-card" style="max-width: 500px; width: 100%;">
      <div class="success-icon">
        <i class="fa-solid fa-circle-check"></i>
      </div>
      <h1 class="hero-title" style="font-size: 2.2rem; margin-bottom: 16px;">Payment Confirmed</h1>
      <p style="color: var(--color-text-secondary); margin-bottom: 24px;">
        Thank you for booking! We are generating your unique tickets and QR access code.
      </p>
      <div class="spinner" style="margin: 0 auto 20px;"></div>
      <p style="color: var(--color-neon-blue); font-weight: 600;">Redirecting to your Ticket...</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const ticketId = urlParams.get('ticketId');
      
      if (!ticketId) {
        window.location.href = '/';
        return;
      }
      
      // Redirect to ticket detail page after 2 seconds
      setTimeout(() => {
        window.location.href = `/ticket.html?id=${ticketId}`;
      }, 2000);
    });
  </script>
</body>
</html>
