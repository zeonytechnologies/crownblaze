<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Ticket - CrownBeatz</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .ticket-outer {
      min-height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }
    .ticket-inner {
      max-width: 600px;
      width: 100%;
    }
    .ticket-card {
      background: linear-gradient(135deg, rgba(20, 10, 35, 0.9) 0%, rgba(10, 5, 20, 0.95) 100%);
      border: 2px solid var(--color-purple);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(123, 44, 191, 0.25);
      position: relative;
    }
    .ticket-header {
      background: linear-gradient(90deg, var(--color-purple), #5e1f99);
      padding: 24px;
      text-align: center;
      border-bottom: 2px dashed rgba(255, 255, 255, 0.15);
    }
    .ticket-body {
      padding: 32px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
      align-items: center;
    }
    @media (max-width: 560px) {
      .ticket-body { grid-template-columns: 1fr; text-align: center; }
      .qr-holder { margin: 0 auto; }
    }
    .ticket-details {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
    }
    .detail-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      letter-spacing: 1px;
    }
    .detail-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }
    .qr-holder {
      background: #fff;
      padding: 12px;
      border-radius: 16px;
      width: 160px;
      height: 160px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    .qr-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .action-row {
      display: flex;
      gap: 16px;
      margin-top: 32px;
      justify-content: center;
    }
    /* Printable Ticket styles */
    @media print {
      body {
        background: #fff;
        color: #000;
      }
      .bg-glow-container, header, footer, .action-row, .logo {
        display: none !important;
      }
      .ticket-outer {
        padding: 0;
        min-height: auto;
      }
      .ticket-card {
        border: 2px solid #000;
        background: #fff !important;
        box-shadow: none !important;
        color: #000 !important;
      }
      .ticket-header {
        background: #000 !important;
        color: #fff !important;
        border-bottom: 2px dashed #000;
      }
      .detail-value {
        color: #000 !important;
      }
      .detail-label {
        color: #666 !important;
      }
      .ticket-inner {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Background Decorative Glowing Orbs -->
  <div class="bg-glow-container">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
  </div>

  <!-- Header -->
  <header>
    <div class="container header-container">
      <a href="/" class="logo">CROWN<span>BEATZ</span></a>
    </div>
  </header>

  <div class="container ticket-outer">
    <div class="ticket-inner">
      
      <!-- Loaded Ticket Card -->
      <div class="ticket-card" id="ticket-content">
        <div class="ticket-header">
          <h2 style="font-family: var(--font-title); font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase;">
            CrownBeatz VIP Pass
          </h2>
          <span style="color: var(--color-neon-blue); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            DJ Night 2026 - Dec 31
          </span>
        </div>
        
        <div class="ticket-body">
          <div class="ticket-details">
            <div class="detail-item">
              <span class="detail-label">Name</span>
              <span class="detail-value" id="ticket-name">Loading...</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Ticket ID</span>
              <span class="detail-value" id="ticket-id" style="color: var(--color-neon-blue); font-family: var(--font-title);">Loading...</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Payment ID</span>
              <span class="detail-value" id="ticket-payment">Loading...</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Quantity / Passes</span>
              <span class="detail-value" id="ticket-qty">Loading...</span>
            </div>
            <div class="detail-item">
              <span class="detail-label">Amount Paid</span>
              <span class="detail-value" id="ticket-amount">Loading...</span>
            </div>
          </div>
          
          <div class="qr-holder">
            <img src="" id="ticket-qr" alt="QR Code" class="qr-img">
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-row">
        <button class="btn-glow" id="btn-print"><i class="fa-solid fa-print"></i> Print Ticket</button>
        <button class="btn-secondary" id="btn-download"><i class="fa-solid fa-download"></i> Download (PDF)</button>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
    // Toast notification function helper
    const showToast = (message, type = 'info') => {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fa-solid fa-circle-info"></i> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 4000);
    };

    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const ticketId = urlParams.get('id');

      if (!ticketId) {
        showToast('No Ticket ID found in URL.', 'error');
        return;
      }

      try {
        const response = await fetch(`/api/ticket/${ticketId}`);
        const data = await response.json();

        if (!data.success) {
          showToast(data.error || 'Failed to fetch ticket.', 'error');
          return;
        }

        const ticket = data.ticket;
        document.getElementById('ticket-name').innerText = ticket.name;
        document.getElementById('ticket-id').innerText = ticket.ticket_id;
        document.getElementById('ticket-payment').innerText = ticket.payment_id;
        const typesArray = [];
        if (ticket.couples_count > 0) typesArray.push(`${ticket.couples_count} Couples`);
        if (ticket.adult_count > 0) typesArray.push(`${ticket.adult_count} Adult`);
        if (ticket.child_count > 0) typesArray.push(`${ticket.child_count} Child`);

        document.getElementById('ticket-qty').innerText = typesArray.join(', ') || `${ticket.ticket_count} Person(s)`;
        document.getElementById('ticket-amount').innerText = `₹${parseFloat(ticket.amount).toFixed(2)}`;
        document.getElementById('ticket-qr').src = ticket.qr_data;

      } catch (error) {
        console.error('Error fetching ticket data:', error);
        showToast('Failed to load ticket details.', 'error');
      }

      // Print Button Handler
      document.getElementById('btn-print').addEventListener('click', () => {
        window.print();
      });

      // Download Button Handler (Redirects to system print to save as PDF)
      document.getElementById('btn-download').addEventListener('click', () => {
        window.print();
      });
    });
  </script>
</body>
</html>
